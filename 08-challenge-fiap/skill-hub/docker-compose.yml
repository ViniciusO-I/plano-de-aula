services:
  mysql:
    image: mysql:8.4
    container_name: skillhub-mysql
    environment:
      MYSQL_DATABASE: skillhubdb
      MYSQL_USER: skillhub
      MYSQL_PASSWORD: skillhub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  skill-hub-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skillhub-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: skillhubdb
      DB_USER: skillhub
      DB_PASSWORD: skillhub
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
      JWT_ACCESS_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mysql-data:

