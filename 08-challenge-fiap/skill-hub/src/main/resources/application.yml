## Application ##
server:
  port: ${PORT:8080}
spring:
  application:
    name: skill-hub-api
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:skillhubdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

## Actuator ##
springdoc:
  show-actuator: false
management:
  endpoints:
    web:
      exposure:
        include: "*"

## Security ##
security:
  jwt:
    issuer: skill-hub-api
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

## Logging ##
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-N/A}] %logger{36} - %msg%n"
