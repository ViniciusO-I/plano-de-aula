spring:
  application:
    name: skill-hub-api

  datasource:
    url: jdbc:h2:mem:skillhubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false
    locations: classpath:db/migration

  h2:
    console:
      enabled: true

server:
  port: 8080

jwt:
