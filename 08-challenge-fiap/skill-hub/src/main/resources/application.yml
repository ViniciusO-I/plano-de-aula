## Application ##
server:
  port: ${PORT:8080}
spring:
  application:
    name: skill-hub-api
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:skillhubdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

## Actuator ##
springdoc:
  show-actuator: false
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info

info:
  app:
    name: skill-hub-api
    description: API for managing skills and mentoring sessions
  links:
    swagger: hhttp://localhost:8080/swagger-ui/index.html
    health: http://localhost:8080/actuator/health
    h2-console: http://localhost:8080/h2-console
  team:
    name: backend-team
    contact: backend@company.com

## Security ##
security:
  jwt:
    issuer: skill-hub-api
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

## Logging ##
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-N/A}] %logger{36} - %msg%n"
