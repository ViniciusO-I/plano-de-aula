## Application ##
server:
  port: ${PORT:8080}
spring:
  application:
    name: skill-hub-api
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:skillhubdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

## Actuator ##
springdoc:
  show-actuator: false
management:
  endpoints:
    web:
      exposure:
        include: "*"